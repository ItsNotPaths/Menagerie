# Release build config — runs inside the Ubuntu 20.04 Docker image.
#
# dynlibOverride replaces the sdl2 binding's dlopen() calls with direct importc,
# so the static .a files are used at link time instead of loading .so at runtime.
#
# Link order matters: higher-level libs before their deps.
#
# Ubuntu 20.04 notes vs the dev nim.cfg:
#   - no -lsharpyuv  (split from libwebp in newer versions, not present in 20.04)
#   - no -lLerc      (libtiff 4.1 in 20.04 predates the Lerc dep)
#   - no -lharfbuzz/-lfreetype from system (vendored into SDL2_ttf, see Dockerfile)
#   - no -lglib-2.0/-lbrotli (vendored freetype built with all optional deps off)
#   - -lstdc++ needed because vendored harfbuzz is C++; -static-libstdc++ bundles
#     it in so the user's libstdc++ version doesn't matter

--threads:on
--mm:orc
path = "src"

dynlibOverride = "SDL2"
dynlibOverride = "SDL2_ttf"
dynlibOverride = "SDL2_image"

# Statically link libstdc++ (harfbuzz is C++; bakes in the GCC 9 runtime)
passL = "-static-libstdc++"

passL = "-Wl,-Bstatic"
passL = "-lSDL2_ttf -lharfbuzz -lfreetype"
passL = "-lSDL2_image -lSDL2"
passL = "-lpng16 -ljpeg -lwebp -lwebpdemux"
passL = "-lz"
passL = "-Wl,-Bdynamic"
# SDL2 dlopen's its backends (X11/Wayland/ALSA etc.) at runtime — dl must be dynamic.
# pthread and rt are glibc companions, always dynamic.
passL = "-ldl -lpthread -lrt -lm"
