# Windows cross-compilation config — MinGW-w64 targeting x86_64-windows.
#
# Used in CI: cp docker-build/nim-windows.cfg nim.cfg before compiling.
# Never used in local dev builds.
#
# SDL2 pre-built MinGW static libs are installed to /opt/sdl2-mingw/ by the CI
# job (official releases from github.com/libsdl-org/{SDL,SDL_ttf,SDL_image}).
#
# Link strategy:
#   -Wl,-Bstatic  : SDL2 + freetype/harfbuzz/png/jpeg/webp/z
#   -Wl,-Bdynamic : Windows system DLLs (always present, import-lib linked)
#   -mwindows     : GUI subsystem (suppresses the console window)
#   -static-libgcc/-static-libstdc++ : bundle MinGW runtime into the .exe
#
# NOTE: These flags are a first-pass. The first CI run may surface missing
# link symbols (e.g. harfbuzz bundled into SDL2_ttf.a vs separate, or extra
# Windows system libs). Iterate on this file based on linker errors.

--threads:on
--mm:orc
path = "src"

cpu      = "amd64"
os       = "windows"
gcc.exe       = "x86_64-w64-mingw32-gcc"
gcc.linkerexe = "x86_64-w64-mingw32-gcc"

dynlibOverride = "SDL2"
dynlibOverride = "SDL2_ttf"
dynlibOverride = "SDL2_image"
dynlibOverride = "pcre"

passC = "-I/opt/sdl2-mingw/x86_64-w64-mingw32/include/SDL2"
passC = "-I/opt/sdl2-mingw/x86_64-w64-mingw32/include"
# Nim converts currentSourcePath to Windows backslashes when os=windows,
# producing paths gcc can't parse on Linux. Supply the correct path here
# so gcc finds lua.h before encountering the broken backslash path.
passC = "-I./vendor/lua/src"

passL = "-L/opt/sdl2-mingw/x86_64-w64-mingw32/lib"
passL = "-static-libgcc -static-libstdc++"
passL = "-Wl,-Bstatic"
passL = "-lSDL2main -lSDL2 -lSDL2_ttf -lSDL2_image"
# freetype/harfbuzz/png/jpeg/webp/z are compiled into SDL2_ttf.a / SDL2_image.a
# by the official MinGW vendored builds — no separate -l flags needed.
passL = "-Wl,-Bdynamic"
passL = "-ldinput8 -ldxguid -luser32 -lgdi32 -lwinmm -limm32"
passL = "-lole32 -loleaut32 -lshell32 -lsetupapi -lversion -luuid"
passL = "-lrpcrt4"
# -ldl does not exist on Windows; removed.
passL = "-mwindows"
