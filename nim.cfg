--threads:on
--mm:orc
path = "src"

# Development build config — compiles inside distrobox, runs on host CachyOS.
#
# Link strategy:
#   dynamic : SDL2, harfbuzz, glib, zlib, system libs (stable ABI, present everywhere)
#   static  : SDL2_ttf, SDL2_image and all format/codec deps (unstable sonames cross-distro)
#
# dynlibOverride tells Nim's codegen to use importc instead of dlopen for those
# libraries, so the statically linked .a versions are used rather than dlopen'd .so.
# Without this, the SDL2 Nim bindings always call dlopen() regardless of link flags.


# Dev build: SDL2_ttf and SDL2_image loaded via dlopen (dynamic).
# The Nim SDL2 bindings use dlopen() for these when dynlibOverride is absent.
# Docker release build uses the static variants (see docker-build/nim.cfg).

passL  = "-lSDL2"
